<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HomeLink — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/mobile.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── FULL BG ── */
.bg{position:fixed;inset:0;z-index:0;}
.bg img{
  width:100%;height:100%;object-fit:cover;
  transform:scale(1.04);
  animation:slowzoom 10s ease forwards;
}
@keyframes slowzoom{from{transform:scale(1.04)}to{transform:scale(1)}}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(8,6,2,0.88) 0%,rgba(8,6,2,0.7) 40%,rgba(8,6,2,0.45) 100%);
}

/* ── LOGO ── */
.site-logo{
  position:fixed;top:32px;left:40px;z-index:10;
  display:flex;align-items:center;gap:10px;
  text-decoration:none;animation:fd 0.6s ease both;
}
.logo-mark{
  width:34px;height:34px;border-radius:10px;
  background:var(--forest);
  display:flex;align-items:center;justify-content:center;
}
.logo-name{
  font-family:'Clash Display',sans-serif;
  font-size:1.2rem;font-weight:700;color:#fff;
}

/* ── TOP RIGHT ── */
.top-right{
  position:fixed;top:38px;right:40px;z-index:10;
  font-size:0.82rem;color:rgba(255,255,255,0.6);
  animation:fd 0.6s ease both;
}
.top-right a{
  color:#fff;font-weight:700;text-decoration:none;
  border-bottom:1.5px solid rgba(255,255,255,0.35);
  padding-bottom:1px;transition:border-color 0.2s;
}
.top-right a:hover{border-color:#fff;}

/* ── PANEL ── */
.panel{
  position:relative;z-index:5;
  height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

/* ── CARD — bigger, more opaque, readable ── */
.card{
  width:100%;max-width:460px;
  background:rgba(87, 80, 68, 0.686);
  backdrop-filter:blur(32px);
  -webkit-backdrop-filter:blur(32px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:28px;
  padding:48px 44px;
  animation:rise 0.65s cubic-bezier(0.23,1,0.32,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.card-h{
  font-family:'Clash Display',sans-serif;
  font-size:2.2rem;font-weight:700;
  color:#fff;letter-spacing:-0.03em;
  margin-bottom:6px;
}
.card-sub{
  font-size:0.88rem;
  color:rgba(255,255,255,0.55);
  margin-bottom:32px;line-height:1.5;
}

/* ── ROLE PILLS ── */
.role-pills{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
.rp{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:100px;
  background:rgba(255,255,255,0.07);
  font-size:0.82rem;font-weight:600;
  color:rgba(255,255,255,0.6);
  cursor:pointer;font-family:inherit;
  transition:all 0.18s;
}
.rp:hover{background:rgba(255,255,255,0.14);color:#fff;border-color:rgba(255,255,255,0.35);}
.rp.active{background:var(--forest);border-color:var(--forest);color:#fff;}
.rp-ico{font-size:0.95rem;}

/* ── ALERT ── */
.alert{
  padding:12px 15px;border-radius:12px;
  font-size:0.82rem;font-weight:500;
  display:none;align-items:center;gap:9px;
  margin-bottom:18px;
}
.alert.error{display:flex;background:rgba(224,92,58,0.18);color:#ffb3a0;border:1px solid rgba(224,92,58,0.28);}
.alert.success{display:flex;background:rgba(28,107,69,0.25);color:#7dd9a8;border:1px solid rgba(28,107,69,0.35);}

/* ── FIELDS ── */
.field{margin-bottom:18px;}
.field-lbl{
  display:block;font-size:0.78rem;font-weight:700;
  color:rgba(255,255,255,0.65);margin-bottom:8px;
  letter-spacing:0.01em;
}
.field-wrap{position:relative;}
.field-ico{
  position:absolute;left:14px;top:50%;
  transform:translateY(-50%);
  color:rgba(255,255,255,0.35);
  display:flex;pointer-events:none;
}
.field-input{
  width:100%;
  padding:14px 18px 14px 42px;
  background:rgba(255,255,255,0.09);
  border:1.5px solid rgba(255,255,255,0.16);
  border-radius:14px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.95rem;
  color:#fff;
  outline:none;transition:all 0.2s;
}
.field-input:focus{
  background:rgba(255,255,255,0.14);
  border-color:rgba(255,255,255,0.45);
  box-shadow:0 0 0 3px rgba(255,255,255,0.06);
}
.field-input::placeholder{color:rgba(255,255,255,0.22);}
.field-input.err{border-color:rgba(224,92,58,0.7);background:rgba(224,92,58,0.1);}

.field-eye{
  position:absolute;right:14px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.35);display:flex;padding:4px;
  transition:color 0.2s;
}
.field-eye:hover{color:rgba(255,255,255,0.75);}

.forgot{text-align:right;margin-top:7px;}
.forgot a{
  font-size:0.76rem;font-weight:600;
  color:rgba(255,255,255,0.4);text-decoration:none;
  transition:color 0.2s;
}
.forgot a:hover{color:rgba(255,255,255,0.8);}

/* ── SUBMIT ── */
.btn-submit{
  width:100%;padding:15px;margin-top:6px;
  background:var(--forest);color:#fff;
  border:none;border-radius:14px;
  font-family:'Clash Display',sans-serif;
  font-size:1.05rem;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 24px rgba(28,107,69,0.45);
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-submit:hover{background:var(--forest2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(28,107,69,0.55);}
.btn-submit:active{transform:translateY(0);}

.card-bottom{
  text-align:center;margin-top:24px;
  font-size:0.8rem;color:rgba(255,255,255,0.35);
}
.card-bottom a{color:rgba(255,255,255,0.7);font-weight:700;text-decoration:none;}
.card-bottom a:hover{color:#fff;}

/* ── BOTTOM-LEFT CAPTION ── */
.bg-caption{
  position:fixed;bottom:36px;left:40px;z-index:5;
  animation:rise 0.7s 0.2s cubic-bezier(0.23,1,0.32,1) both;
}
.bg-caption-tag{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:100px;padding:6px 14px;
  font-size:0.7rem;font-weight:700;
  color:rgba(255,255,255,0.75);
  letter-spacing:0.07em;text-transform:uppercase;
  margin-bottom:12px;width:fit-content;
}
.cap-dot{width:5px;height:5px;border-radius:50%;background:var(--forest-mid);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.bg-caption-h{
  font-family:'Clash Display',sans-serif;
  font-size:1.55rem;font-weight:700;color:#fff;
  line-height:1.15;letter-spacing:-0.025em;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.bg-caption-h span{color:var(--forest-mid);}

@keyframes fd{from{opacity:0}to{opacity:1}}

@media(max-width:500px){
  .site-logo{top:20px;left:20px;}
  .top-right{top:24px;right:20px;}
  .bg-caption{display:none;}
  .card{padding:36px 28px;}
}
</style>
<link rel="stylesheet" href="../css/chatbot-widget.css"/>
</head>
<body>

<!-- BG IMAGE — cozy lit interior, totally different -->
<div class="bg">
  <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1800&h=1100&fit=crop&q=90" alt=""/>
</div>

<!-- LOGO -->
<a href="../index.html" class="site-logo">
  <span class="logo-mark">
    <svg viewBox="0 0 24 24" width="17" height="17">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="1.8"/>
      <circle cx="12" cy="9" r="2.8" fill="#fff"/>
    </svg>
  </span>
  <span class="logo-name">HomeLink</span>
</a>

<div class="top-right">New here? <a href="signup.html">Create account →</a></div>

<!-- CAPTION -->
<div class="bg-caption">
  <div class="bg-caption-tag"><span class="cap-dot"></span>Welcome back</div>
  <div class="bg-caption-h">Your next home<br>is <span>one login</span> away.</div>
</div>

<!-- FORM -->
<div class="panel">
  <div class="card">

    <h1 class="card-h">Sign in</h1>
    <p class="card-sub">Select your role and enter your credentials.</p>

    <div class="role-pills">
      <button class="rp active" onclick="setRole(this,'user')" type="button"><span class="rp-ico">👤</span> User</button>
      <button class="rp" onclick="setRole(this,'broker')" type="button"><span class="rp-ico">🤝</span> Broker</button>
      <button class="rp" onclick="setRole(this,'owner')" type="button"><span class="rp-ico">🏢</span> PG / Owner</button>
    </div>

    <div class="alert" id="alertBox">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertTxt"></span>
    </div>

    <div class="field">
      <label class="field-lbl" for="emailInp">Email or Phone</label>
      <div class="field-wrap">
        <span class="field-ico">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input class="field-input" id="emailInp" type="text" placeholder="you@email.com or 9876543210" autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <label class="field-lbl" for="passInp">Password</label>
      <div class="field-wrap">
        <span class="field-ico">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <input class="field-input" id="passInp" type="password" placeholder="Your password" autocomplete="current-password"/>
        <button class="field-eye" onclick="togglePass()" type="button">
          <svg id="eyeIco" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-submit" onclick="handleLogin()" type="button">
      Sign in
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h12M7 1l6 6-6 6"/></svg>
    </button>

    <div class="card-bottom">No account? <a href="signup.html">Sign up free</a></div>

  </div>
</div>

<script src="../js/data/users.js"></script>
<script>
let selectedRole = 'user';

function setRole(el, role) {
  document.querySelectorAll('.rp').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedRole = role;
}

// ================= PASSWORD TOGGLE =================
let passVisible = false;
function togglePass() {
  passVisible = !passVisible;
  document.getElementById('passInp').type = passVisible ? 'text' : 'password';
  document.getElementById('eyeIco').innerHTML = passVisible
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

// ================= ALERT =================
function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.className = 'alert ' + type;
  document.getElementById('alertTxt').textContent = msg;
}

// ================= LOGIN =================
function handleLogin() {
  const email = document.getElementById('emailInp').value.trim().toLowerCase();
  const pass  = document.getElementById('passInp').value;

  const eInp = document.getElementById('emailInp');
  const pInp = document.getElementById('passInp');

  eInp.classList.remove('err');
  pInp.classList.remove('err');
  document.getElementById('alertBox').className = 'alert';

  // ✅ Validation
  if (!email || !pass) {
    if (!email) eInp.classList.add('err');
    if (!pass) pInp.classList.add('err');
    showAlert('Please fill in all fields.', 'error');
    return;
  }

  const local = JSON.parse(localStorage.getItem('hl_users')) || [];
  const allUsers = [...staticUsers, ...local];

  // ✅ FIXED: works for both staticUsers + new users
  const match = allUsers.find(u =>
    (u.private?.email || u.email)?.toLowerCase() === email &&
    u.password === pass
  );

  if (!match) {
    eInp.classList.add('err');
    pInp.classList.add('err');
    showAlert('Incorrect email or password.', 'error');
    return;
  }

  // 🔐 Save login (IMPORTANT FIX)
  localStorage.setItem('hl_user', JSON.stringify(match));

  showAlert('Welcome back, ' + match.name.split(' ')[0] + ' 👋', 'success');

  setTimeout(() => {
    window.location.href = 'home.html';
  }, 1000);
}

// ================= ENTER KEY =================
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ================= AUTO REDIRECT =================
if (localStorage.getItem('hl_user')) {
  window.location.href = 'home.html';
}
</script>

<script src="../js/main.js"></script>
<script src="../js/chatbot-widget.js"></script>
</body>
</html>
